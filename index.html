<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoopNote — 본 만큼만 말해요</title>
  <meta name="description" content="SOOP 버추얼 스트리머 시청자 리뷰">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">SoopNote</a>
    <span class="tagline">본 만큼만 말해요</span>
    <div class="header-actions">
      <button id="auth-btn" class="auth-btn">인증하기</button>
      <span id="auth-status" class="auth-status" style="display:none;"></span>
    </div>
  </header>

  <main class="main-content">
    <div id="streamer-grid" class="streamer-grid">
      <div class="loading">불러오는 중...</div>
    </div>
  </main>

  <!-- 인증 모달 -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">

    <!-- Step 1: share URL 입력 -->
    <div id="step-auth" class="modal-box">
      <div class="modal-header">
        <h2>리캡 인증</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <p class="modal-desc">SOOP 리캡 공유 링크를 붙여넣어 주세요.<br>2시간 이상 시청한 스트리머에 노트를 남길 수 있어요.</p>
      <input type="url" id="share-url-input" placeholder="https://dontaskname.github.io/soop-recap-share/share.html#v2.g...">
      <p id="auth-error" class="modal-error" style="display:none;"></p>
      <button id="verify-btn" class="btn-primary">인증하기</button>
    </div>

    <!-- Step 2: 스트리머 선택 -->
    <div id="step-select" class="modal-box" style="display:none;">
      <div class="modal-header">
        <h2>스트리머 선택</h2>
        <button class="modal-close" id="modal-close2">✕</button>
      </div>
      <p class="modal-desc">노트를 남길 스트리머를 선택하세요.</p>
      <div id="streamer-select-list" class="streamer-select-list"></div>
    </div>

    <!-- Step 3: 리뷰 작성 -->
    <div id="step-write" class="modal-box" style="display:none;">
      <div class="modal-header">
        <h2 id="write-title">노트 작성</h2>
        <button class="modal-close" id="modal-close3">✕</button>
      </div>
      <div id="write-watch-badge" class="watch-badge"></div>

      <!-- 별점 -->
      <div class="rating-grid">
        <div class="rating-row">
          <span class="rating-label">아바타</span>
          <div class="stars" data-key="avatar"></div>
        </div>
        <div class="rating-row">
          <span class="rating-label">노래</span>
          <div class="stars" data-key="song"></div>
        </div>
        <div class="rating-row">
          <span class="rating-label">소통</span>
          <div class="stars" data-key="talk"></div>
        </div>
        <div class="rating-row">
          <span class="rating-label">출석률</span>
          <div class="stars" data-key="attend"></div>
        </div>
      </div>

      <textarea id="note-content" placeholder="솔직한 노트를 남겨주세요... (최대 500자)" maxlength="500" rows="4"></textarea>

      <div class="image-upload-wrap">
        <label for="note-images" class="upload-label">📷 사진 추가 (최대 2장, 2MB↓, webp/jpg/png)</label>
        <input type="file" id="note-images" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none;">
        <div id="image-preview" class="image-preview"></div>
      </div>

      <p id="write-error" class="modal-error" style="display:none;"></p>
      <button id="submit-btn" class="btn-primary">노트 등록</button>
    </div>

  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/recap-auth.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
