<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoopNote</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/streamer.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">SoopNote</a>
    <div class="header-actions">
      <a href="/" class="back-link">← 목록</a>
      <button id="auth-btn" class="auth-btn">인증하기</button>
    </div>
  </header>

  <main class="streamer-page">
    <div id="profile-section" class="profile-section">
      <div class="loading">불러오는 중...</div>
    </div>

    <div id="custom-notice" class="custom-notice" style="display:none;"></div>

    <section class="notes-section">
      <div class="notes-header">
        <h2 class="section-title">시청자 노트</h2>
      </div>
      <div id="notes-list" class="notes-list">
        <div class="loading">불러오는 중...</div>
      </div>
    </section>
  </main>

  <!-- 인증/작성 모달 (메인과 동일 구조) -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div id="step-auth" class="modal-box">
      <div class="modal-header">
        <h2>리캡 인증</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <p class="modal-desc">SOOP 리캡 공유 링크를 붙여넣어 주세요.</p>
      <input type="url" id="share-url-input" placeholder="https://dontaskname.github.io/soop-recap-share/share.html#v2.g...">
      <p id="auth-error" class="modal-error" style="display:none;"></p>
      <button id="verify-btn" class="btn-primary">인증하기</button>
    </div>

    <div id="step-write" class="modal-box" style="display:none;">
      <div class="modal-header">
        <h2 id="write-title">노트 작성</h2>
        <button class="modal-close" id="modal-close2">✕</button>
      </div>
      <div id="write-watch-badge" class="watch-badge"></div>
      <div class="rating-grid">
        <div class="rating-row"><span class="rating-label">아바타</span><div class="stars" data-key="avatar"></div></div>
        <div class="rating-row"><span class="rating-label">노래</span><div class="stars" data-key="song"></div></div>
        <div class="rating-row"><span class="rating-label">소통</span><div class="stars" data-key="talk"></div></div>
        <div class="rating-row"><span class="rating-label">출석률</span><div class="stars" data-key="attend"></div></div>
      </div>
      <textarea id="note-content" placeholder="솔직한 노트를 남겨주세요... (최대 500자)" maxlength="500" rows="4"></textarea>
      <div class="image-upload-wrap">
        <label class="upload-label">📷 사진 추가 (최대 2장, 2MB↓)</label>
        <input type="file" id="note-images" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none;">
        <div id="image-preview" class="image-preview"></div>
      </div>
      <p id="write-error" class="modal-error" style="display:none;"></p>
      <button id="submit-btn" class="btn-primary">노트 등록</button>
    </div>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/recap-auth.js"></script>
  <script src="/js/streamer.js"></script>
</body>
</html>
